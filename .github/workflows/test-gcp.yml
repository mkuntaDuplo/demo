name: Test GCP Path
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  gcp-test:
    name: GCP Login + gcloud Setup
    runs-on: ubuntu-latest
    environment:
      name: perf
    env:
      DUPLO_TOKEN: ${{ secrets.DUPLO_TOKEN }}
      DUPLO_HOST: https://qa-aws.duplocloud.net/
      DUPLO_TENANT: auto-02

    steps:
      - name: Duplo Setup (GCP)
        uses: mkuntaDuplo/actions@node24-test
        with:
          region: us-central1
          account-id: ${{ secrets.GCP_PROJECT_ID }}
          credentials: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Verify gcloud is set up
        run: |
          gcloud version
          gcloud config list
          gcloud auth list
