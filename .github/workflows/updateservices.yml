name: Update Service using update-image
on:
  push:
    branches:
      - master # branch to trigger on

jobs:
  update_service:
    name: Update Service
    runs-on: ubuntu-latest
    environment: 
      name: perf
    env:
      DUPLO_TOKEN: ${{ secrets.DUPLO_TOKEN }}
      DUPLO_HOST: https://qa-aws.duplocloud.net/
      DUPLO_TENANT: auto-02
    steps: 
    
    # install and login to the cloud
    - name: Duplo Setup
      uses: mkuntaDuplo/actions@node24-test

    # uses duploctl from above
    - name: Update Service
      uses: mkuntaDuplo/actions/update-image@node24-test
      with:
        name: serv1
        image: nginx:123
        type: service

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-west-2  
        mask-account-id: 'true'   

    - name: Update Multiple Images
      uses: mkuntaDuplo/actions/update-images@node24-test
      with:
        services: |
          [
            {
              "service": "serv1",
              "image": "myregistry/frontend:v1.2.3"
            }
          ]
        